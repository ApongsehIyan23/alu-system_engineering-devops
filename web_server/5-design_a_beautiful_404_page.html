<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Ceci n'est pas une page</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --ink: #1a1410;
    --red: #c0392b;
    --gold: #b8860b;
    --pipe: #8b7355;
  }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  /* Decorative border frame */
  .frame {
    position: fixed;
    inset: 20px;
    border: 2px solid var(--ink);
    pointer-events: none;
    z-index: 10;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--pipe);
    pointer-events: none;
  }

  /* Corner ornaments */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 11;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 10px; left: 10px; }
  .corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner.br { bottom: 10px; right: 10px; transform: scale(-1); }

  .container {
    text-align: center;
    padding: 40px;
    max-width: 700px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pipe-wrapper {
    position: relative;
    margin: 0 auto 20px;
    display: inline-block;
  }

  .pipe-img {
    width: 180px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
  }

  .strike {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--red);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
    border-top: 2px solid var(--red);
    border-bottom: 2px solid var(--red);
    padding: 4px 10px;
    opacity: 0;
    animation: strikeIn 0.6s ease 1s forwards;
  }

  @keyframes strikeIn {
    from { opacity: 0; transform: translate(-50%, -50%) rotate(-20deg) scale(1.3); }
    to { opacity: 1; transform: translate(-50%, -50%) rotate(-20deg) scale(1); }
  }

  .error-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(100px, 20vw, 160px);
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.04em;
    position: relative;
    display: inline-block;
  }

  .error-number::after {
    content: '404';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px var(--pipe);
    transform: translate(4px, 4px);
    z-index: -1;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--ink), var(--gold), var(--ink), transparent);
    margin: 16px 0;
    opacity: 0.6;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--ink);
    margin: 10px 0 6px;
    letter-spacing: 0.01em;
  }

  .subtitle span {
    color: var(--red);
  }

  .meta {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--pipe);
    margin-bottom: 32px;
  }

  .description {
    font-size: 13px;
    line-height: 1.8;
    color: var(--ink);
    opacity: 0.75;
    max-width: 420px;
    margin: 0 auto 36px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }

  .home-btn {
    display: inline-block;
    padding: 12px 36px;
    border: 2px solid var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
    position: relative;
    transition: all 0.3s ease;
    background: transparent;
    cursor: pointer;
  }

  .home-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .home-btn:hover {
    color: var(--cream);
  }

  .home-btn:hover::before {
    transform: scaleX(1);
  }

  .watermark {
    position: fixed;
    bottom: 36px;
    right: 50px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--pipe);
    opacity: 0.5;
  }
</style>
</head>
<body>

<!-- Frame -->
<div class="frame"></div>

<!-- Corner ornaments -->
<div class="corner tl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#1a1410" stroke-width="2"/>
    <path d="M8 32 L8 8 L32 8" stroke="#8b7355" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#b8860b"/>
  </svg>
</div>
<div class="corner tr">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#1a1410" stroke-width="2"/>
    <path d="M8 32 L8 8 L32 8" stroke="#8b7355" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#b8860b"/>
  </svg>
</div>
<div class="corner bl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#1a1410" stroke-width="2"/>
    <path d="M8 32 L8 8 L32 8" stroke="#8b7355" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#b8860b"/>
  </svg>
</div>
<div class="corner br">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#1a1410" stroke-width="2"/>
    <path d="M8 32 L8 8 L32 8" stroke="#8b7355" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#b8860b"/>
  </svg>
</div>

<div class="container">

  <!-- Magritte pipe SVG -->
  <div class="pipe-wrapper">
    <svg class="pipe-img" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Pipe bowl -->
      <ellipse cx="60" cy="55" rx="28" ry="32" fill="#5c3d1e" stroke="#3b2510" stroke-width="2"/>
      <ellipse cx="60" cy="42" rx="20" ry="14" fill="#3b2510"/>
      <ellipse cx="60" cy="42" rx="16" ry="10" fill="#1a0f07"/>
      <!-- Pipe stem -->
      <path d="M88 65 Q130 68 175 58" stroke="#5c3d1e" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M88 65 Q130 72 175 63" stroke="#3b2510" stroke-width="3" stroke-linecap="round" fill="none"/>
      <!-- Smoke -->
      <path d="M55 24 Q48 14 55 6" stroke="#aaa" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M63 20 Q72 10 63 2" stroke="#bbb" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round">
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      </path>
    </svg>
    <div class="strike">Ceci n'est pas une page</div>
  </div>

  <div class="error-number">404</div>

  <div class="divider"></div>

  <p class="subtitle">Ceci n'est pas <span>une page</span></p>
  <p class="meta">Page not found &nbsp;·&nbsp; Erreur quatre cent quatre</p>

  <p class="description">
    The page you are looking for does not exist — much like the pipe above is not truly a pipe, but merely a representation of one.
  </p>

  <a href="/" class="home-btn">Return Home</a>
</div>

<div class="watermark">René Magritte · 1929 · 404</div>

</body>
</html>
