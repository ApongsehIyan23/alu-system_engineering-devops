<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Lost?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 100px;
            margin: 0;
        }

        p {
            font-size: 20px;
            margin: 10px 0;
        }

        .quote {
            margin-top: 20px;
            font-style: italic;
            color: #ccc;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        a:hover {
            background: #ff4757;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <p>Oops. You’ve reached a place that doesn’t exist.</p>

    <p class="quote">Ceci n'est pas une page</p>

    <p>Maybe the link is broken… or maybe you're exploring too well 👀</p>

    <a href="/">Take me home</a>
</div>

</body>
</html>
